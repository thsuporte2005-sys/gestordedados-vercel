      function Quiz({ onComplete }) {
        const [currentIndex, setCurrentIndex] = useState(0);
        const [animating, setAnimating] = useState(false);
        const [stats, setStats] = useState([0, 0, 0]);
        const [showAnalysisBtn, setShowAnalysisBtn] = useState(false);
        const [isFakeLoading, setIsFakeLoading] = useState(false);

        const step = quizSteps[currentIndex];
        const actualStep = currentIndex; // Etapa 0 é Pág Inicial. Etapa 1 é "1 de 23".
        const percentage = actualStep > 0 ? Math.round((actualStep / 23) * 100) : 0;

        const handleNext = () => {
          if (currentIndex < quizSteps.length - 1) {
            setAnimating(true);
            setTimeout(() => {
              setCurrentIndex(prev => prev + 1);
              setAnimating(false);
            }, 300);
          } else {
            onComplete();
          }
        };

        useEffect(() => {
          if (step.type === 'analysis') {
            setIsFakeLoading(true);
            setTimeout(() => {
              setIsFakeLoading(false);
              const targets = step.stats.map(s => s.value);
              setTimeout(() => {
                const interval = setInterval(() => {
                  setStats(prev => {
                    const next = prev.map((val, i) => {
                      if (val < targets[i]) return val + 1;
                      return val;
                    });
                    if (next.every((val, i) => val >= targets[i])) {
                      clearInterval(interval);
                      setShowAnalysisBtn(true);
                    }
                    return next;
                  });
                }, 30);
              }, 100);
            }, 2500);
          } else {
            setStats([0, 0, 0]);
            setShowAnalysisBtn(false);
          }
        }, [step]);

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto mt-8">
                  <div className="rounded-3xl overflow-hidden shadow-xl border-4 border-white drop-shadow-sm hover:scale-[1.02] transition-all duration-300">
                    <img src="./public/imagens/depoimento1.jpg" alt="Depoimento Estudiante 1" className="w-full h-auto object-cover"/>
                  </div>
                  <div className="rounded-3xl overflow-hidden shadow-xl border-4 border-white drop-shadow-sm hover:scale-[1.02] transition-all duration-300">
                    <img src="./public/imagens/epoimento2.jpg" alt="Depoimento Estudiante 2" className="w-full h-auto object-cover"/>
                  </div>
                </div>
              </section>

              <section className="bg-white rounded-3xl shadow-2xl p-8 md:p-12 border border-gray-100">
                 <h3 className="text-3xl font-black mb-8 text-center text-gray-900">❓ PREGUNTAS FRECUENTES</h3>
                 <div className="space-y-4">
                   {faqs.map((faq, idx) => (
                     <div key={idx} className="border border-gray-200 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-shadow">
                       <button 
                         onClick={() => setOpenFaq(openFaq === idx ? null : idx)} 
                         className="w-full text-left p-6 bg-gray-50 hover:bg-gray-100 flex justify-between items-center transition-colors font-bold text-gray-900 text-base md:text-lg"
                       >
                         {faq.q}
                         <i className={`fa-solid ${openFaq === idx ? 'fa-chevron-up' : 'fa-chevron-down'} text-gray-400`}></i>
                       </button>
                       {openFaq === idx && (
                         <div className="p-6 bg-white border-t border-gray-100 text-gray-600 text-base font-medium leading-relaxed">
                           {faq.a}
                         </div>
                       )}
                     </div>
                   ))}
                 </div>
              </section>

              <div className="text-center pb-8 pt-8 max-w-xl mx-auto">
                 <button 
                   onClick={() => document.getElementById('offer').scrollIntoView({behavior: 'smooth'})}
                   className="w-full py-6 rounded-xl border-none font-black text-white text-xl md:text-2xl bg-[#ec4899] hover:scale-[1.02] hover:shadow-2xl active:scale-95 active:shadow-md transition-all duration-300 flex justify-center uppercase shadow-[0_15px_40px_rgba(236,72,153,0.4)] animate-pulse-btn"
                 >
                   🔥 ¡SÍ, QUIERO COMENZAR HOY!
                 </button>
              </div>

              <footer className="text-center text-sm font-bold text-gray-400 border-t border-gray-200 pt-10 pb-6">
                 © 2026 Método Bolis Lucrativos - Todos los derechos reservados
              </footer>
            </div>
            )}
          </div>
        );
      }

      function App() {
        const [isQuizComplete, setIsQuizComplete] = useState(false);

        return (
          <div className="w-full flex justify-center items-start min-h-screen">
            {isQuizComplete ? (
              <VSL />
            ) : (
              <Quiz onComplete={() => setIsQuizComplete(true)} />
            )}
          </div>
        );
      }

      const rootElement = document.getElementById('root');
      const root = ReactDOM.createRoot(rootElement);
      root.render(<App />);
    </script>
</body>
</html>
